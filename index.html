<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XENOS // Red Team OS</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=IBM+Plex+Mono:wght@300;400;500;600&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
/* نفس الـ CSS الأصلي كامل بدون تغيير */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#04080f;--bg2:#070d1a;--card:#0a1322;--card2:#0e1a2e;
  --border:#162540;--border2:#1e3354;
  --green:#00ff88;--cyan:#00d4ff;--red:#ff2244;--yellow:#ffd60a;--orange:#ff7c00;
  --text:#c8daf0;--muted:#3d5a7a;--dim:#1e3354;
  --p1:#4361ee;--p2:#06d6a0;--p3:#ef233c;
  --sidebar:220px;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;display:flex}
/* scanlines */
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,255,136,0.008) 3px,rgba(0,255,136,0.008) 4px);pointer-events:none;z-index:9999}

/* باقي الـ CSS الأصلي كما هو ... (انسخ كل الـ <style> القديم هنا) */
.sidebar{width:var(--sidebar);min-height:100vh;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:100}
/* ... باقي الستايل كامل ... حتى نهاية الـ </style> */
</style>
</head>
<body>

<nav class="sidebar">
  <div class="sb-brand">
    <div class="sb-brand-name">XENOS</div>
    <div class="sb-brand-sub">Red Team OS 2026</div>
  </div>
  <div class="sb-nav">
    <div class="sb-item active" data-view="today" onclick="nav('today')"><span class="sb-icon">⚡</span><span class="sb-label">Today</span></div>
    <div class="sb-item" data-view="roadmap" onclick="nav('roadmap')"><span class="sb-icon">🗺️</span><span class="sb-label">Roadmap</span></div>
    <div class="sb-item" data-view="skills" onclick="nav('skills')"><span class="sb-icon">📊</span><span class="sb-label">Skills</span></div>
    <div class="sb-item" data-view="rooms" onclick="nav('rooms')"><span class="sb-icon">🔵</span><span class="sb-label">Rooms</span></div>
  </div>
  <div class="sb-footer">
    <div>obadahamed.github.io</div>
    <div class="sb-week-badge" id="sb-week">W??</div>
  </div>
</nav>

<main class="main">
  <div id="v-today" class="view active"></div>
  <div id="v-roadmap" class="view"></div>
  <div id="v-skills" class="view"></div>
  <div id="v-rooms" class="view"></div>
</main>

<script>
// ──────────────────────────────────────────────
// البيانات الأساسية (نفسها)
const PRELOADED_ROOMS = ["Linux Fundamentals Part 1", /* ... باقي القائمة كما هي ... */ "The Game"];
const SKILLS_DEF = [ /* نفس المصفوفة */ ];
const WEEKS_DATA = [ /* نفس البيانات */ ];
const BONUS_POOL = [ /* نفس القائمة */ ];
const START_DATE = new Date('2026-03-02');

// ──────────────────────────────────────────────
// إضافات جديدة لـ Bonus Room + Gamification
const ROOM_SLUGS = {
  "Linux Fundamentals Part 1": "linuxfundamentalspart1",
  "Linux Privilege Escalation": "linuxprivesc",
  "Windows Privilege Escalation": "windows10privesc",
  "SQL Injection": "sqlinjectionlm",
  "Burp Suite: The Basics": "burpsuitebasics",
  "Metasploit: Introduction": "metasploitintro",
  "Nmap": "nmap",
  "OWASP Juice Shop": "owaspjuiceshop",
  "Mr Robot CTF": "mrrobot",
  "Pickle Rick": "picklerick",
  "OhSINT": "ohsint",
  "Blue": "blue",
  // أضف المزيد إذا أردت روابط مباشرة أكثر
};

const ROOM_DESCRIPTIONS = {
  "SQL Injection": "تعلم استغلال ثغرات الحقن في قواعد البيانات (Error-based, Union-based, Blind)",
  "Linux Privilege Escalation": "تقنيات SUID، Cron، Capabilities، GTFOBins وغيرها",
  "Burp Suite: The Basics": "أساسيات Burp لاعتراض الطلبات وتعديلها",
  "Mr Robot CTF": "تحدي مستوحى من المسلسل – Enumeration + Web + PrivEsc",
  "Pickle Rick": "CTF كلاسيكي – Web + Linux PrivEsc ممتع",
  // أضف وصف قصير لأي غرفة تحب
};

// ──────────────────────────────────────────────
// الحالة (State) مع إضافة XP
const S = {
  tasks: {},
  routine: {},
  extraRooms: [],
  notes: {},
  ratings: {},
  view: 'today',
  phase: 1,
  roomFilter: 'all',
  roomSearch: '',
  xp: localStorage.getItem('xenos_xp') ? parseInt(localStorage.getItem('xenos_xp')) : 0,
};

function loadState() {
  try {
    const t = localStorage.getItem('xenos_tasks'); if(t) S.tasks = JSON.parse(t);
    const r = localStorage.getItem('xenos_routine'); if(r) S.routine = JSON.parse(r);
    const e = localStorage.getItem('xenos_extra'); if(e) S.extraRooms = JSON.parse(e);
    const n = localStorage.getItem('xenos_notes'); if(n) S.notes = JSON.parse(n);
    const g = localStorage.getItem('xenos_ratings'); if(g) S.ratings = JSON.parse(g);
    const v = localStorage.getItem('xenos_view'); if(v) S.view = v;
  } catch(err) { console.log('State load error:', err); }
}

function save(key, val) {
  try {
    localStorage.setItem(key, JSON.stringify(val));
    // تحديث XP بعد أي تغيير يؤثر على النقاط
    if (key === 'xenos_tasks' || key === 'xenos_routine' || key === 'xenos_extra') {
      updateXP();
    }
  } catch(e) {}
}

// ──────────────────────────────────────────────
// حساب XP + Level
function updateXP() {
  let xp = 0;

  // من الـ streak
  xp += getStreak() * 10;

  // من المهام الأسبوعية
  Object.values(S.tasks).forEach(done => { if (done) xp += 15; });

  // من الـ rooms (الإضافية + اللي تم toggle)
  // ملاحظة: حالياً نحسب الإضافية فقط – لو عايز الـ preloaded كمان، قل لي نعدل
  xp += S.extraRooms.length * 30;

  S.xp = xp;
  localStorage.setItem('xenos_xp', S.xp);
}

function getLevel() {
  return Math.floor(S.xp / 500) + 1;
}

function xpToNextLevel() {
  const lvl = getLevel();
  return (lvl * 500) - S.xp;
}

// ──────────────────────────────────────────────
// باقي الدوال الأصلية (getCurrentWeek, getWeekProgress, getTodayKey, ...) تبقى كما هي
// ... (انسخها من الملف الأصلي)

// ──────────────────────────────────────────────
// تعديل renderToday لإظهار XP + Bonus محسن
function renderToday() {
  const wn = getCurrentWeek();
  const wk = WEEKS_DATA.find(w => w.num === wn);
  const dayName = getTodayDayName();
  const todayKey = getTodayKey();
  const routine = S.routine[todayKey] || {};
  const streak = getStreak();
  const bonus = getBonusRoom();
  const totalRooms = getAllRooms().size;

  const todayDay = wk ? wk.days.find(d => d.d === dayName) : null;

  let html = `
    <div class="topbar">
      <div class="topbar-title">// <span>Today's Mission</span></div>
      <div class="topbar-right">${new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>
    </div>
    <div style="margin-bottom:1.5rem">
      <div class="today-date">${formatDate()}</div>
      <div class="today-day">الأسبوع ${wn} — ${wk ? wk.topic : '...'}</div>
      <div class="today-week">${wk ? wk.dates : ''}</div>
    </div>

    <div class="grid-3" style="margin-bottom:1.5rem">
      <div class="card">
        <div class="stat-num">${wn}<span style="font-size:1rem;color:var(--muted)">/52</span></div>
        <div class="stat-label">Current Week</div>
        <div class="stat-sub">المرحلة ${wk ? wk.phase : 1}</div>
      </div>
      <div class="card">
        <div class="stat-num" style="color:\( {streak>=7?'var(--yellow)':streak>=3?'var(--orange)':'var(--green)'}"> \){streak}</div>
        <div class="stat-label">Streak <span class="streak-fire">${streak>=7?'🔥':streak>=3?'✨':'⚡'}</span></div>
        <div class="stat-sub">يوم متتالي — دنتال + تمرين</div>
      </div>
      <div class="card">
        <div class="stat-num" style="color:var(--cyan)">${totalRooms}</div>
        <div class="stat-label">Rooms Done</div>
        <div class="stat-sub">THM Rooms مكتملة</div>
      </div>
      <div class="card">
        <div class="stat-num" style="color:var(--yellow)">Level ${getLevel()}</div>
        <div class="stat-label">Your Level</div>
        <div class="stat-sub">XP: ${S.xp} • ${xpToNextLevel()} to next</div>
      </div>
    </div>

    <div class="grid-2" style="margin-bottom:1.5rem">
      <div class="card">
        <div class="card-title">الروتين اليومي</div>
        <!-- باقي الروتين كما هو -->
      </div>

      <div class="card">
        <div class="card-title">Bonus THM Room</div>
        <div class="bonus-room">
          <div class="bonus-icon">🔵</div>
          <div>
            <div class="bonus-label">Room of the Day</div>
            <div class="bonus-name">${bonus}</div>
            \( {ROOM_DESCRIPTIONS[bonus] ? `<div style="font-size:0.75rem;color:var(--muted);margin:0.4rem 0 0.2rem;"> \){ROOM_DESCRIPTIONS[bonus]}</div>` : ''}
            <a href="${ROOM_SLUGS[bonus] 
              ? `https://tryhackme.com/room/${ROOM_SLUGS[bonus]}`
              : `https://tryhackme.com/r/search?search=${encodeURIComponent(bonus)}`}" 
              target="_blank" 
              class="bonus-link">
              ${ROOM_SLUGS[bonus] ? 'افتح الروم مباشرة ↗' : 'ابحث في TryHackMe ↗'}
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- باقي محتوى Today (مهام اليوم، مهام الأسبوع، ملاحظات) كما هو -->
    <!-- ... انسخ باقي الـ html من renderToday الأصلي ... -->
  `;

  document.getElementById('v-today').innerHTML = html;
}

// باقي الدوال (nav, renderView, renderRoadmap, ...) تبقى كما هي
// ... انسخها من الملف الأصلي

// في النهاية:
loadState();
nav(S.view);
document.getElementById('sb-week').textContent = 'W'+String(getCurrentWeek()).padStart(2,'0');
updateXP(); // تحديث أولي لـ XP
</script>
</body>
</html>
