```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cyber Security 52 Week Roadmap</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400;600&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Inter;
background:#0b0f1c;
color:white;

}

/* HEADER */

header{

text-align:center;
padding:40px;

}

header h1{

font-family:Orbitron;
color:#00e5ff;
font-size:40px;

}

header p{

opacity:.7;
margin-top:10px;

}

/* CONTAINER */

.container{

max-width:1200px;
margin:auto;
padding:20px;

}

/* PROGRESS */

.progress-box{

margin-bottom:40px;

}

.progress{

height:14px;
background:#11172a;
border-radius:10px;
overflow:hidden;

}

.progress-bar{

height:100%;
width:0%;
background:linear-gradient(90deg,#00e5ff,#4b8cff);

}

/* GRID */

.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;

}

/* WEEK CARD */

.week-card{

background:#11172a;
padding:20px;
border-radius:12px;
cursor:pointer;
transition:.25s;

}

.week-card:hover{

transform:translateY(-5px);
box-shadow:0 10px 25px #00e5ff33;

}

.week-header{

display:flex;
justify-content:space-between;
align-items:center;

}

.week-title{

font-family:Orbitron;
color:#00e5ff;

}

.week-topic{

opacity:.7;
margin-top:4px;

}

/* DAYS */

.days{

display:none;
flex-direction:column;
gap:8px;
margin-top:15px;

}

.week-card.open .days{

display:flex;

}

.day{

background:#0d1324;
padding:8px;
border-radius:6px;
display:flex;
gap:8px;
align-items:center;

}

footer{

margin-top:60px;
text-align:center;
padding:30px;
opacity:.6;

}

</style>
</head>

<body>

<header>

<h1>Cyber Security Roadmap</h1>
<p>52 Week Learning Plan</p>

</header>


<div class="container">

<div class="progress-box">

<div class="progress">
<div class="progress-bar" id="bar"></div>
</div>

</div>

<div class="grid" id="weeks"></div>

</div>

<footer>
Interactive Cyber Security Learning Map
</footer>


<script>

const topics=[

"Linux Fundamentals",
"Networking",
"Python Security",
"Web Security",
"Burp Suite",
"SQL Injection",
"XSS",
"Authentication",
"Privilege Escalation",
"Linux PrivEsc",
"Windows PrivEsc",
"Active Directory",
"Kerberos",
"Lateral Movement",
"BloodHound",
"Metasploit",
"Nmap",
"Wireshark",
"Packet Analysis",
"Reverse Shells",
"Enumeration",
"Password Attacks",
"Hash Cracking",
"Hydra",
"John the Ripper",
"Cryptography",
"TLS",
"JWT",
"API Security",
"OWASP Top 10",
"File Upload Attacks",
"Command Injection",
"SSRF",
"XXE",
"Bug Bounty",
"Reconnaissance",
"Subdomain Enumeration",
"OSINT",
"Cloud Security",
"AWS Security",
"Docker Security",
"Kubernetes Security",
"Mobile Security",
"Android Security",
"iOS Security",
"Binary Exploitation",
"Buffer Overflow",
"ROP Chains",
"Malware Analysis",
"Threat Hunting",
"Blue Team Basics",
"Final Projects"

];

const weeksEl=document.getElementById("weeks");

let progress=JSON.parse(localStorage.getItem("roadmap"))||{};

function build(){

weeksEl.innerHTML="";

topics.forEach((topic,i)=>{

const week=i+1;

let daysHTML="";

for(let d=1; d<=5; d++){

const key=`${week}-${d}`;

const checked=progress[key]?"checked":"";

daysHTML+=`

<div class="day">

<input type="checkbox" data-key="${key}" ${checked}>

<span>Day ${d} practice</span>

</div>

`;

}

const card=document.createElement("div");

card.className="week-card";

card.innerHTML=`

<div class="week-header">

<div>

<div class="week-title">Week ${week}</div>
<div class="week-topic">${topic}</div>

</div>

<div>▼</div>

</div>

<div class="days">

${daysHTML}

</div>

`;

card.addEventListener("click",()=>{

card.classList.toggle("open");

});

weeksEl.appendChild(card);

});

attach();

update();

}

function attach(){

document.querySelectorAll("input").forEach(cb=>{

cb.addEventListener("change",()=>{

progress[cb.dataset.key]=cb.checked;

localStorage.setItem("roadmap",JSON.stringify(progress));

update();

});

});

}

function update(){

const total=52*5;

const done=Object.values(progress).filter(v=>v).length;

const percent=Math.floor(done/total*100);

document.getElementById("bar").style.width=percent+"%";

}

build();

</script>

</body>
</html>
```
