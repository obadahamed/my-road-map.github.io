<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cyber Security Roadmap</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400;600&display=swap');

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{

font-family:Inter;
background:#0a0f1c;
color:white;
overflow-x:hidden;

}

/* BACKGROUND GRID */

body:before{

content:"";
position:fixed;
inset:0;

background:
linear-gradient(#00fff220 1px,transparent 1px),
linear-gradient(90deg,#00fff220 1px,transparent 1px);

background-size:40px 40px;

animation:gridMove 20s linear infinite;

z-index:-1;

}

@keyframes gridMove{

from{transform:translateY(0)}
to{transform:translateY(40px)}

}


/* HEADER */

header{

padding:40px;
text-align:center;

}

header h1{

font-family:Orbitron;
font-size:42px;
letter-spacing:2px;
color:#00fff2;

}

header p{

margin-top:10px;
opacity:.7;

}

/* CONTAINER */

.container{

max-width:1200px;
margin:auto;
padding:20px;

}


/* STATS */

.stats{

display:flex;
gap:20px;
margin-bottom:40px;
flex-wrap:wrap;

}

.stat{

flex:1;
background:#11172a;
padding:20px;
border-radius:12px;

box-shadow:
0 0 15px #00fff210;

}

.stat h2{

color:#00fff2;

}

/* WEEK GRID */

.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;

}

/* WEEK CARD */

.week{

background:#11172a;
border-radius:14px;
padding:20px;
cursor:pointer;

transition:.3s;

position:relative;

overflow:hidden;

}

.week:hover{

transform:translateY(-6px);
box-shadow:0 10px 30px #00fff230;

}

.week h3{

font-family:Orbitron;
color:#00fff2;

}

.topic{

opacity:.7;
margin-top:6px;

}

/* DAYS */

.days{

margin-top:15px;
display:none;
flex-direction:column;
gap:10px;

}

.week.open .days{

display:flex;

}

.day{

display:flex;
align-items:center;
gap:10px;

background:#0d1324;
padding:8px 10px;
border-radius:8px;

}

.day input{

transform:scale(1.2);

}

/* PROGRESS BAR */

.progress{

height:12px;
background:#0d1324;
border-radius:8px;
margin-top:20px;
overflow:hidden;

}

.bar{

height:100%;
width:0%;
background:linear-gradient(90deg,#00fff2,#4b8cff);

transition:.4s;

}


/* FOOTER */

footer{

margin-top:60px;
padding:30px;
text-align:center;
opacity:.6;

}

/* RESPONSIVE */

@media(max-width:700px){

header h1{font-size:28px}

}

</style>
</head>

<body>

<header>

<h1>Cyber Security Roadmap</h1>
<p>Interactive learning map</p>

</header>


<div class="container">

<div class="stats">

<div class="stat">
<h2 id="done">0</h2>
<p>Tasks Done</p>
</div>

<div class="stat">
<h2 id="total">0</h2>
<p>Total Tasks</p>
</div>

<div class="stat">
<h2 id="percent">0%</h2>
<p>Progress</p>
</div>

</div>


<div class="progress">
<div class="bar" id="bar"></div>
</div>


<br><br>

<div class="grid" id="weeks"></div>

</div>


<footer>
Cyber Roadmap — Smart Interactive Planner
</footer>


<script>

const roadmap=[

{
week:1,
topic:"Linux Fundamentals",
days:[
"Linux basics",
"Filesystem",
"Permissions",
"Bash commands",
"Networking basics"
]
},

{
week:2,
topic:"Networking",
days:[
"OSI model",
"TCP/IP",
"Ports & protocols",
"Packet analysis",
"Wireshark"
]
},

{
week:3,
topic:"Python for Security",
days:[
"Python basics",
"Automation scripts",
"Port scanner",
"Log parser",
"Mini project"
]
},

{
week:4,
topic:"Web Security",
days:[
"HTTP protocol",
"Burp Suite",
"XSS basics",
"SQL injection",
"Web lab"
]
},

{
week:5,
topic:"Privilege Escalation",
days:[
"Linux privesc",
"Sudo abuse",
"SUID binaries",
"Enumeration",
"Practice lab"
]
},

{
week:6,
topic:"Active Directory",
days:[
"AD basics",
"BloodHound",
"Kerberos attacks",
"Lateral movement",
"Lab"
]
}

];


const weeksEl=document.getElementById("weeks");

const doneEl=document.getElementById("done");
const totalEl=document.getElementById("total");
const percentEl=document.getElementById("percent");
const bar=document.getElementById("bar");


let saved=JSON.parse(localStorage.getItem("progress"))||{};

function build(){

weeksEl.innerHTML="";

roadmap.forEach((w,i)=>{

const card=document.createElement("div");
card.className="week";

let daysHTML="";

w.days.forEach((d,di)=>{

const key=`${i}-${di}`;

const checked=saved[key]?"checked":"";

daysHTML+=`

<div class="day">

<input type="checkbox" data-key="${key}" ${checked}>

<span>${d}</span>

</div>

`;

});

card.innerHTML=`

<h3>Week ${w.week}</h3>
<div class="topic">${w.topic}</div>

<div class="days">

${daysHTML}

</div>

`;

card.addEventListener("click",()=>{

card.classList.toggle("open");

});

weeksEl.appendChild(card);

});

attach();
update();

}

function attach(){

document.querySelectorAll("input").forEach(cb=>{

cb.addEventListener("change",()=>{

saved[cb.dataset.key]=cb.checked;

localStorage.setItem("progress",JSON.stringify(saved));

update();

});

});

}


function update(){

const total=roadmap.reduce((a,w)=>a+w.days.length,0);

const done=Object.values(saved).filter(v=>v).length;

const percent=Math.floor(done/total*100);

doneEl.innerText=done;
totalEl.innerText=total;
percentEl.innerText=percent+"%";

bar.style.width=percent+"%";

}

build();

</script>

</body>
</html>
