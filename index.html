<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XENOS // Red Team OS</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=IBM+Plex+Mono:wght@300;400;500;600&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#04080f;--bg2:#070d1a;--card:#0a1322;--card2:#0e1a2e;
  --border:#162540;--border2:#1e3354;
  --green:#00ff88;--cyan:#00d4ff;--red:#ff2244;--yellow:#ffd60a;--orange:#ff7c00;
  --text:#c8daf0;--muted:#3d5a7a;--dim:#1e3354;
  --p1:#4361ee;--p2:#06d6a0;--p3:#ef233c;
  --sidebar:220px;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;display:flex}
/* scanlines */
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,255,136,0.008) 3px,rgba(0,255,136,0.008) 4px);pointer-events:none;z-index:9999}

/* SIDEBAR */
.sidebar{width:var(--sidebar);min-height:100vh;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:100}
.sb-brand{padding:1.5rem 1rem 1rem;border-bottom:1px solid var(--border)}
.sb-brand-name{font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:900;color:var(--green);text-shadow:0 0 15px rgba(0,255,136,0.4);letter-spacing:0.05em}
.sb-brand-sub{font-size:0.55rem;color:var(--muted);letter-spacing:0.2em;margin-top:0.2rem}
.sb-nav{flex:1;padding:0.5rem 0}
.sb-item{display:flex;align-items:center;gap:0.75rem;padding:0.75rem 1.2rem;cursor:pointer;transition:all 0.15s;border-right:2px solid transparent;font-size:0.7rem;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase}
.sb-item:hover{background:rgba(255,255,255,0.03);color:var(--text)}
.sb-item.active{background:rgba(0,255,136,0.06);color:var(--green);border-right-color:var(--green)}
.sb-icon{font-size:1rem;width:1.5rem;text-align:center}
.sb-footer{padding:1rem;border-top:1px solid var(--border);font-size:0.55rem;color:var(--muted);text-align:center;line-height:1.8}
.sb-week-badge{display:inline-block;padding:0.15rem 0.5rem;background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.3);color:var(--green);font-family:'Orbitron',sans-serif;font-size:0.6rem;margin-top:0.3rem}

/* MAIN */
.main{flex:1;overflow-y:auto;height:100vh}
.view{display:none;padding:2rem;min-height:100vh}
.view.active{display:block}

/* TOP BAR */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem}
.topbar-title{font-family:'Orbitron',sans-serif;font-size:0.65rem;font-weight:600;color:var(--muted);letter-spacing:0.3em;text-transform:uppercase}
.topbar-title span{color:var(--green)}
.topbar-right{font-size:0.6rem;color:var(--muted)}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);padding:1.5rem;transition:border-color 0.2s}
.card:hover{border-color:var(--border2)}
.card-title{font-family:'Orbitron',sans-serif;font-size:0.6rem;font-weight:600;color:var(--muted);letter-spacing:0.25em;text-transform:uppercase;margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem}
.card-title::before{content:'//';color:var(--green);font-size:0.55rem}

/* GRID */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem}

/* TODAY VIEW */
.today-date{font-family:'Orbitron',sans-serif;font-size:2rem;font-weight:900;color:var(--text);line-height:1.1}
.today-day{font-size:0.8rem;color:var(--green);margin-top:0.3rem;letter-spacing:0.1em}
.today-week{font-size:0.65rem;color:var(--muted);margin-top:0.2rem}
.stat-num{font-family:'Orbitron',sans-serif;font-size:2rem;font-weight:900;color:var(--green);text-shadow:0 0 20px rgba(0,255,136,0.3)}
.stat-label{font-size:0.6rem;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;margin-top:0.3rem}
.stat-sub{font-size:0.55rem;color:var(--dim);margin-top:0.2rem}

/* ROUTINE CHECKS */
.routine-item{display:flex;align-items:center;gap:1rem;padding:0.75rem 0;border-bottom:1px solid var(--border)}
.routine-item:last-child{border-bottom:none}
.routine-check{width:20px;height:20px;border:2px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0}
.routine-check.done{border-color:var(--green);background:rgba(0,255,136,0.1)}
.routine-check.done::after{content:'✓';color:var(--green);font-size:0.75rem;font-weight:700}
.routine-text{flex:1;font-family:'Cairo',sans-serif;font-size:0.85rem}
.routine-emoji{font-size:1.2rem}
.streak-fire{font-size:1.5rem}

/* TODAY TASKS */
.task-item{padding:0.75rem 0;border-bottom:1px solid rgba(22,37,64,0.7);display:flex;align-items:flex-start;gap:0.75rem;cursor:pointer;transition:background 0.1s}
.task-item:hover{background:rgba(255,255,255,0.02)}
.task-item:last-child{border-bottom:none}
.task-cb{width:16px;height:16px;border:1px solid var(--border2);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.task-cb.done{border-color:var(--green);background:rgba(0,255,136,0.15)}
.task-cb.done::after{content:'✓';color:var(--green);font-size:0.6rem;font-weight:700}
.task-text{font-family:'Cairo',sans-serif;font-size:0.85rem;flex:1;transition:color 0.15s}
.task-item.done .task-text{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--muted)}
.task-badge{font-size:0.5rem;padding:0.15rem 0.45rem;border:1px solid;text-transform:uppercase;letter-spacing:0.1em;flex-shrink:0;margin-top:2px}
.badge-thm{color:#3b9eff;border-color:rgba(59,158,255,0.4);background:rgba(59,158,255,0.07)}
.badge-ps{color:#ff9500;border-color:rgba(255,149,0,0.4);background:rgba(255,149,0,0.07)}
.badge-vh{color:#a855f7;border-color:rgba(168,85,247,0.4);background:rgba(168,85,247,0.07)}
.badge-wu{color:#22d3ee;border-color:rgba(34,211,238,0.4);background:rgba(34,211,238,0.07)}
.badge-th{color:#f59e0b;border-color:rgba(245,158,11,0.4);background:rgba(245,158,11,0.07)}
.badge-pr{color:#10b981;border-color:rgba(16,185,129,0.4);background:rgba(16,185,129,0.07)}
.badge-py{color:#84cc16;border-color:rgba(132,204,22,0.4);background:rgba(132,204,22,0.07)}
.badge-gh{color:#a78bfa;border-color:rgba(167,139,250,0.4);background:rgba(167,139,250,0.07)}
.badge-bb{color:#fb923c;border-color:rgba(251,146,60,0.4);background:rgba(251,146,60,0.07)}
.badge-ctf{color:#34d399;border-color:rgba(52,211,153,0.4);background:rgba(52,211,153,0.07)}
.badge-rp{color:#60a5fa;border-color:rgba(96,165,250,0.4);background:rgba(96,165,250,0.07)}
.badge-ejpt{color:#fbbf24;border-color:rgba(251,191,36,0.4);background:rgba(251,191,36,0.07)}
.badge-ca{color:#a3e635;border-color:rgba(163,230,53,0.4);background:rgba(163,230,53,0.07)}
.badge-lab{color:#f472b6;border-color:rgba(244,114,182,0.4);background:rgba(244,114,182,0.07)}
.badge-ad{color:#14b8a6;border-color:rgba(20,184,166,0.4);background:rgba(20,184,166,0.07)}
.badge-en{color:#38bdf8;border-color:rgba(56,189,248,0.4);background:rgba(56,189,248,0.07)}

/* BONUS ROOM */
.bonus-room{padding:1rem;background:rgba(59,158,255,0.06);border:1px solid rgba(59,158,255,0.2);display:flex;align-items:center;gap:1rem}
.bonus-icon{font-size:1.5rem}
.bonus-label{font-size:0.55rem;color:#3b9eff;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:0.3rem}
.bonus-name{font-size:0.85rem;color:var(--text)}
.bonus-link{font-size:0.6rem;color:#3b9eff;text-decoration:none;letter-spacing:0.1em;display:inline-flex;align-items:center;gap:0.3rem;margin-top:0.3rem}
.bonus-link:hover{color:var(--cyan)}

/* WEEK PROGRESS */
.week-prog-bar{height:6px;background:var(--border);position:relative;overflow:hidden;margin-top:0.5rem}
.week-prog-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--cyan));transition:width 0.5s ease}
.week-prog-text{font-size:0.6rem;color:var(--muted);margin-top:0.3rem;display:flex;justify-content:space-between}

/* NOTES */
.week-notes{width:100%;background:rgba(10,19,34,0.8);border:1px solid var(--border);color:var(--text);font-family:'Cairo',sans-serif;font-size:0.85rem;padding:0.75rem;resize:vertical;min-height:80px;line-height:1.6;direction:rtl}
.week-notes:focus{outline:none;border-color:var(--border2)}
.week-notes::placeholder{color:var(--muted)}
.rating-row{display:flex;gap:0.5rem;margin-top:0.75rem}
.rating-btn{padding:0.3rem 0.75rem;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:0.6rem;cursor:pointer;letter-spacing:0.1em;transition:all 0.15s}
.rating-btn:hover{border-color:var(--border2);color:var(--text)}
.rating-btn.active-all{border-color:#10b981;color:#10b981;background:rgba(16,185,129,0.1)}
.rating-btn.active-most{border-color:#f59e0b;color:#f59e0b;background:rgba(245,158,11,0.1)}
.rating-btn.active-delayed{border-color:#ef4444;color:#ef4444;background:rgba(239,68,68,0.1)}

/* ROADMAP VIEW */
.phase-tabs{display:flex;gap:0;margin-bottom:1.5rem;border-bottom:1px solid var(--border)}
.pt{padding:0.65rem 1.5rem;font-family:'Orbitron',sans-serif;font-size:0.6rem;font-weight:600;letter-spacing:0.15em;cursor:pointer;border:1px solid transparent;border-bottom:none;margin-bottom:-1px;transition:all 0.2s;color:var(--muted);background:transparent;text-transform:uppercase}
.pt:hover{background:var(--card);color:var(--text)}
.pt.p1a{color:var(--p1);border-color:var(--p1);background:rgba(67,97,238,0.08)}
.pt.p2a{color:var(--p2);border-color:var(--p2);background:rgba(6,214,160,0.08)}
.pt.p3a{color:var(--p3);border-color:var(--p3);background:rgba(239,35,60,0.08)}
.weeks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:0.75rem}
.wc{background:var(--card);border:1px solid var(--border);transition:all 0.15s}
.wc:hover{border-color:var(--border2)}
.wc.cur{border-color:var(--green);box-shadow:0 0 20px rgba(0,255,136,0.1)}
.wc.p1:hover{border-color:rgba(67,97,238,0.4)}
.wc.p2:hover{border-color:rgba(6,214,160,0.4)}
.wc.p3:hover{border-color:rgba(239,35,60,0.3)}
.wh{padding:0.85rem 1rem;display:flex;align-items:center;gap:0.75rem;cursor:pointer;border-bottom:1px solid transparent;transition:border-color 0.2s}
.wc.open .wh{border-bottom-color:var(--border)}
.wnum{font-family:'Orbitron',sans-serif;font-size:0.55rem;font-weight:800;padding:0.25rem 0.5rem;min-width:46px;text-align:center}
.p1 .wnum{color:var(--p1);border:1px solid rgba(67,97,238,0.4);background:rgba(67,97,238,0.08)}
.p2 .wnum{color:var(--p2);border:1px solid rgba(6,214,160,0.4);background:rgba(6,214,160,0.08)}
.p3 .wnum{color:var(--p3);border:1px solid rgba(239,35,60,0.3);background:rgba(239,35,60,0.06)}
.cur .wnum{color:var(--green)!important;border-color:var(--green)!important;background:rgba(0,255,136,0.1)!important}
.wi{flex:1}
.wtopic{font-family:'Cairo',sans-serif;font-size:0.85rem;font-weight:700;color:var(--text)}
.wdates{font-size:0.55rem;color:var(--muted);margin-top:0.15rem}
.wprog{height:2px;background:var(--border);margin-top:0.4rem}
.wprogf{height:100%;background:var(--green);transition:width 0.3s}
.wtog{font-size:0.7rem;color:var(--muted);transition:transform 0.2s;flex-shrink:0}
.wc.open .wtog{transform:rotate(180deg)}
.wdays{display:none}
.wc.open .wdays{display:block}
.dr{padding:0.6rem 1rem;border-bottom:1px solid rgba(22,37,64,0.5);display:flex;align-items:flex-start;gap:0.5rem;cursor:pointer;transition:background 0.1s}
.dr:last-child{border-bottom:none}
.dr:hover{background:rgba(255,255,255,0.02)}
.dr.done .dr-task{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--dim)}
.dname{font-family:'Orbitron',sans-serif;font-size:0.5rem;color:var(--muted);min-width:58px;padding-top:2px;letter-spacing:0.1em}
.dr-task{font-family:'Cairo',sans-serif;font-size:0.8rem;flex:1;line-height:1.3}
.cur-banner{background:rgba(0,255,136,0.07);border-bottom:1px solid rgba(0,255,136,0.15);padding:0.35rem;text-align:center;font-family:'Orbitron',sans-serif;font-size:0.55rem;color:var(--green);letter-spacing:0.2em}

/* SKILLS VIEW */
.skill-row{padding:1rem 0;border-bottom:1px solid rgba(22,37,64,0.5)}
.skill-row:last-child{border-bottom:none}
.skill-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.6rem}
.skill-name{display:flex;align-items:center;gap:0.5rem;font-family:'Cairo',sans-serif;font-size:0.9rem;font-weight:600}
.skill-icon{font-size:1rem}
.skill-pct{font-family:'Orbitron',sans-serif;font-size:0.7rem;font-weight:700}
.skill-bar{height:8px;background:var(--border);position:relative;overflow:hidden}
.skill-fill{height:100%;position:relative;transition:width 1s ease}
.skill-fill::after{content:'';position:absolute;top:0;right:0;bottom:0;width:20px;background:rgba(255,255,255,0.15);filter:blur(4px)}
.skill-meta{font-size:0.6rem;color:var(--muted);margin-top:0.4rem;display:flex;justify-content:space-between}
.skill-rooms{font-size:0.6rem;color:var(--muted);margin-top:0.3rem}

/* ROOMS VIEW */
.rooms-header{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem}
.rooms-search{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:0.75rem;padding:0.6rem 1rem;outline:none;direction:ltr}
.rooms-search:focus{border-color:var(--border2)}
.rooms-search::placeholder{color:var(--muted)}
.add-room-row{display:flex;gap:0.5rem;margin-bottom:1rem}
.add-room-input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:0.7rem;padding:0.5rem 0.75rem;outline:none;direction:ltr}
.add-room-input:focus{border-color:var(--green)}
.btn-add{padding:0.5rem 1rem;background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.3);color:var(--green);font-family:'Orbitron',sans-serif;font-size:0.55rem;letter-spacing:0.15em;cursor:pointer;transition:all 0.15s;text-transform:uppercase}
.btn-add:hover{background:rgba(0,255,136,0.2)}
.rooms-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:0.5rem}
.room-item{padding:0.65rem 0.9rem;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;gap:0.7rem;cursor:pointer;transition:all 0.15s}
.room-item:hover{border-color:var(--border2)}
.room-item.completed{border-color:rgba(0,255,136,0.2);background:rgba(0,255,136,0.04)}
.room-dot{width:8px;height:8px;border:1px solid var(--muted);border-radius:50%;flex-shrink:0;transition:all 0.15s}
.room-item.completed .room-dot{background:var(--green);border-color:var(--green);box-shadow:0 0 6px rgba(0,255,136,0.4)}
.room-item-name{font-size:0.7rem;flex:1;line-height:1.3;direction:ltr}
.room-tags{display:flex;gap:0.3rem;flex-wrap:wrap;margin-top:0.2rem}
.room-tag{font-size:0.45rem;padding:0.1rem 0.35rem;border:1px solid var(--dim);color:var(--muted);letter-spacing:0.05em}
.rooms-stats{display:flex;gap:1.5rem;margin-bottom:1rem;padding:0.75rem 1rem;background:var(--card);border:1px solid var(--border)}
.rooms-stat{text-align:center}
.rooms-stat-n{font-family:'Orbitron',sans-serif;font-size:1.2rem;font-weight:700;color:var(--green)}
.rooms-stat-l{font-size:0.55rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase}
.filter-row{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1rem}
.filter-btn{padding:0.3rem 0.7rem;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:0.55rem;cursor:pointer;letter-spacing:0.08em;transition:all 0.15s;text-transform:uppercase}
.filter-btn:hover{color:var(--text);border-color:var(--border2)}
.filter-btn.active{border-color:var(--green);color:var(--green);background:rgba(0,255,136,0.07)}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2)}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}

/* RESPONSIVE */
@media(max-width:900px){
  :root{--sidebar:60px}
  .sb-label,.sb-brand-sub,.sb-brand-name{display:none}
  .sb-item{justify-content:center;padding:0.75rem}
  .sb-icon{width:auto}
  .view{padding:1rem}
  .grid-2,.grid-3{grid-template-columns:1fr}
}
</style>
</head>
<body>

<nav class="sidebar">
  <div class="sb-brand">
    <div class="sb-brand-name">XENOS</div>
    <div class="sb-brand-sub">Red Team OS 2026</div>
  </div>
  <div class="sb-nav">
    <div class="sb-item active" data-view="today" onclick="nav('today')"><span class="sb-icon">⚡</span><span class="sb-label">Today</span></div>
    <div class="sb-item" data-view="roadmap" onclick="nav('roadmap')"><span class="sb-icon">🗺️</span><span class="sb-label">Roadmap</span></div>
    <div class="sb-item" data-view="skills" onclick="nav('skills')"><span class="sb-icon">📊</span><span class="sb-label">Skills</span></div>
    <div class="sb-item" data-view="rooms" onclick="nav('rooms')"><span class="sb-icon">🔵</span><span class="sb-label">Rooms</span></div>
  </div>
  <div class="sb-footer">
    <div>obadahamed.github.io</div>
    <div class="sb-week-badge" id="sb-week">W??</div>
  </div>
</nav>

<main class="main">
  <div id="v-today" class="view active"></div>
  <div id="v-roadmap" class="view"></div>
  <div id="v-skills" class="view"></div>
  <div id="v-rooms" class="view"></div>
</main>

function save(key, val) {

// ===== COMPUTED =====
function getAllRooms() {
  const all = new Set([...PRELOADED_ROOMS, ...S.extraRooms]);
  return all;
}
function isRoomDone(name) { return getAllRooms().has(name); }

function calcSkills() {
  const res = {};
  SKILLS_DEF.forEach(sk => {
    if(!sk.rooms.length) { res[sk.id] = 0; return; }
    const done = sk.rooms.filter(r => isRoomDone(r)).length;
    res[sk.id] = Math.round(done / sk.rooms.length * 100);
  });
  return res;
}

function getCurrentWeek() {
  const now = new Date();
  const diff = Math.floor((now - START_DATE) / (7 * 24 * 3600 * 1000));
  return Math.min(52, Math.max(1, diff + 1));
}

function getWeekProgress(wn) {
  const wk = WEEKS_DATA.find(w => w.num === wn);
  if(!wk) return 0;
  const days = wk.days;
  const done = days.filter(d => S.tasks[`w${wn}_${d.d}`]).length;
  return days.length ? Math.round(done / days.length * 100) : 0;
}

function getTodayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getTodayDayName() {
  const days = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  return days[new Date().getDay()];
}

function getBonusRoom() {
  const daysSinceStart = Math.floor((new Date() - START_DATE) / (24*3600*1000));
  return BONUS_POOL[Math.abs(daysSinceStart) % BONUS_POOL.length];
}

function getStreak() {
  let streak = 0;
  const today = new Date();
  for(let i = 0; i < 365; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const r = S.routine[key];
    if(r && r.teeth && r.exercise) streak++;
    else if(i > 0) break;
  }
  return streak;
}

function getTotalTasksDone() {
  return Object.values(S.tasks).filter(Boolean).length;
}

function formatDate() {
  const d = new Date();
  return d.toLocaleDateString('ar-SA', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
}

  // Week notes
  const noteVal = S.notes[`w${wn}`] || '';
  const rating = S.ratings[`w${wn}`] || '';
  html += `<div class="card">
    <div class="card-title">ملاحظات الأسبوع ${wn}</div>
    <textarea class="week-notes" placeholder="اكتب ملاحظاتك هنا..." onchange="saveNote(${wn},this.value)">${noteVal}</textarea>
    <div class="rating-row">
      <button class="rating-btn ${rating==='all'?'active-all':''}" onclick="setRating(${wn},'all')">✅ أنجزت الكل</button>
      <button class="rating-btn ${rating==='most'?'active-most':''}" onclick="setRating(${wn},'most')">🟡 معظم المهام</button>
      <button class="rating-btn ${rating==='delayed'?'active-delayed':''}" onclick="setRating(${wn},'delayed')">🔴 تأخيرات</button>
    </div>
  </div>`;

  document.getElementById('v-today').innerHTML = html;
}

// ===== ROADMAP VIEW =====
function switchPhase(p) {
  S.phase = p;
  document.querySelectorAll('.pt').forEach(el => {
    el.className = 'pt' + (parseInt(el.dataset.p)===p ? ' p'+p+'a' : '');
  });
  renderWeeksGrid();
}

function renderRoadmap() {
  const wn = getCurrentWeek();
  let html = `
    <div class="topbar"><div class="topbar-title">// <span>52-Week Roadmap</span></div></div>
    <div class="phase-tabs">
      <div class="pt ${S.phase===1?'p1a':''}" data-p="1" onclick="switchPhase(1)">■ Phase I — Foundation (W1-13)</div>
      <div class="pt ${S.phase===2?'p2a':''}" data-p="2" onclick="switchPhase(2)">■ Phase II — Specialization (W14-26)</div>
      <div class="pt ${S.phase===3?'p3a':''}" data-p="3" onclick="switchPhase(3)">■ Phase III — Pro & Career (W27-52)</div>
    </div>
    <div class="weeks-grid" id="weeks-grid"></div>`;
  document.getElementById('v-roadmap').innerHTML = html;
  renderWeeksGrid();
}

function renderWeeksGrid() {
  const wn = getCurrentWeek();
  const filtered = WEEKS_DATA.filter(w => w.phase === S.phase);
  const grid = document.getElementById('weeks-grid');
  if(!grid) return;
  grid.innerHTML = filtered.map(w => {
    const prog = getWeekProgress(w.num);
    const isCur = w.num === wn;
    const isOpen = isCur;
    const daysHtml = w.days.map(d => {
      const key = `w${w.num}_${d.d}`;
      const done = S.tasks[key];
      return `<div class="dr ${done?'done':''}" onclick="toggleTask('${key}');event.stopPropagation()">
        <div class="dname">${d.d}</div>
        <div class="task-badge badge-${d.t}" style="margin-top:1px">${d.t.toUpperCase()}</div>
        <div class="dr-task">${d.task}</div>
        <div class="task-cb ${done?'done':''}" style="flex-shrink:0;margin-top:2px"></div>
      </div>`;
    }).join('');
    return `<div class="wc p${w.phase} ${isCur?'cur':''} ${isOpen?'open':''}" id="rwk${w.num}">
      ${isCur?'<div class="cur-banner">▶ CURRENT WEEK — ACTIVE</div>':''}
      <div class="wh" onclick="toggleWeek(${w.num})">
        <div class="wnum">W${String(w.num).padStart(2,'0')}</div>
        <div class="wi">
          <div class="wtopic">${w.topic}</div>
          <div class="wdates">${w.dates}</div>
          <div class="wprog"><div class="wprogf" style="width:${prog}%"></div></div>
        </div>
        <div style="font-size:0.6rem;color:var(--muted);margin-left:0.5rem">${prog}%</div>
        <div class="wtog">▼</div>
      </div>
      <div class="wdays">${daysHtml}</div>
    </div>`;
  }).join('');

  // scroll to current
  setTimeout(() => {
    const el = document.getElementById(`rwk${wn}`);
    if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
  }, 100);
}

function toggleWeek(n) {
  const el = document.getElementById(`rwk${n}`);
  if(el) el.classList.toggle('open');
}

// ===== SKILLS VIEW =====
function renderSkills() {
  const skills = calcSkills();
  const allRooms = getAllRooms();
  let html = `<div class="topbar"><div class="topbar-title">// <span>Skill Matrix</span></div><div class="topbar-right">${allRooms.size} rooms completed</div></div>`;
  html += `<div class="card"><div class="card-title">تقدم المهارات — محسوب من الرومات المكتملة</div>`;

  SKILLS_DEF.forEach(sk => {
    const pct = skills[sk.id] || 0;
    const doneRooms = sk.rooms.filter(r => allRooms.has(r));
    const grad = `linear-gradient(90deg, ${sk.color}, ${sk.color}88)`;
    html += `<div class="skill-row">
      <div class="skill-header">
        <div class="skill-name"><span class="skill-icon">${sk.icon}</span>${sk.ar}</div>
        <div class="skill-pct" style="color:${sk.color}">${pct}%</div>
      </div>
      <div class="skill-bar"><div class="skill-fill" style="width:${pct}%;background:${grad}"></div></div>
      <div class="skill-meta">
        <span>${doneRooms.length}/${sk.rooms.length} rooms</span>
        <span>${pct<30?'🔴 مبتدئ':pct<60?'🟡 متوسط':pct<80?'🟢 جيد':'💚 متقدم'}</span>
      </div>
      ${doneRooms.length > 0 ? `<div class="skill-rooms">${doneRooms.slice(0,5).join(' · ')}${doneRooms.length>5?` +${doneRooms.length-5} more`:''}</div>` : ''}
    </div>`;
  });

  html += `</div>`;

  // Top 5 skills mini chart
  const sorted = SKILLS_DEF.map(sk => ({...sk, pct: skills[sk.id]||0})).sort((a,b) => b.pct-a.pct);
  html += `<div class="card" style="margin-top:1rem"><div class="card-title">أقوى 5 مهارات</div><div style="display:flex;flex-direction:column;gap:0.5rem">`;
  sorted.slice(0,5).forEach((sk,i) => {
    html += `<div style="display:flex;align-items:center;gap:1rem">
      <div style="font-family:'Orbitron',sans-serif;font-size:0.55rem;color:var(--muted);min-width:18px">#${i+1}</div>
      <div style="font-size:0.7rem;min-width:160px;font-family:'Cairo',sans-serif">${sk.icon} ${sk.ar}</div>
      <div style="flex:1;height:4px;background:var(--border)"><div style="height:100%;background:${sk.color};width:${sk.pct}%"></div></div>
      <div style="font-family:'Orbitron',sans-serif;font-size:0.6rem;color:${sk.color};min-width:32px">${sk.pct}%</div>
    </div>`;
  });
  html += `</div></div>`;

  document.getElementById('v-skills').innerHTML = html;
  setTimeout(() => {
    document.querySelectorAll('.skill-fill').forEach(el => el.style.width = el.style.width);
  }, 50);
}

// ===== ROOMS VIEW =====
function renderRooms() {
  const allRooms = getAllRooms();
  const allRoomsList = [...PRELOADED_ROOMS, ...S.extraRooms.filter(r => !PRELOADED_ROOMS.includes(r))];
  const filtered = allRoomsList.filter(r => {
    const matchSearch = S.roomSearch === '' || r.toLowerCase().includes(S.roomSearch.toLowerCase());
    if(S.roomFilter === 'done') return allRooms.has(r) && matchSearch;
    if(S.roomFilter === 'pending') return !allRooms.has(r) && matchSearch;
    return matchSearch;
  });

  const totalAll = allRoomsList.length;
  const totalDone = allRooms.size;

  let html = `<div class="topbar"><div class="topbar-title">// <span>Room Tracker</span></div></div>
    <div class="rooms-stats">
      <div class="rooms-stat"><div class="rooms-stat-n">${totalDone}</div><div class="rooms-stat-l">Completed</div></div>
      <div class="rooms-stat"><div class="rooms-stat-n">${totalAll}</div><div class="rooms-stat-l">Total Listed</div></div>
      <div class="rooms-stat"><div class="rooms-stat-n" style="color:var(--cyan)">${Math.round(totalDone/totalAll*100)}%</div><div class="rooms-stat-l">Completion</div></div>
    </div>
    <div class="add-room-row">
      <input class="add-room-input" id="newRoomInput" placeholder="Add new room name..." onkeydown="if(event.key==='Enter')addRoom()" />
      <button class="btn-add" onclick="addRoom()">+ Add</button>
    </div>
    <div class="rooms-header">
      <input class="rooms-search" placeholder="Search rooms..." oninput="S.roomSearch=this.value;renderRooms()" value="${S.roomSearch}" />
    </div>
    <div class="filter-row">
      <button class="filter-btn ${S.roomFilter==='all'?'active':''}" onclick="S.roomFilter='all';renderRooms()">ALL</button>
      <button class="filter-btn ${S.roomFilter==='done'?'active':''}" onclick="S.roomFilter='done';renderRooms()">✅ DONE</button>
      <button class="filter-btn ${S.roomFilter==='pending'?'active':''}" onclick="S.roomFilter='pending';renderRooms()">⏳ PENDING</button>
    </div>
    <div class="rooms-grid">`;

  filtered.forEach(r => {
    const done = allRooms.has(r);
    // find relevant skills
    const tags = SKILLS_DEF.filter(sk => sk.rooms.includes(r)).map(sk => sk.id);
    html += `<div class="room-item ${done?'completed':''}" onclick="toggleRoom('${r.replace(/'/g,"\\'")}')">
      <div class="room-dot"></div>
      <div style="flex:1">
        <div class="room-item-name">${r}</div>
        ${tags.length?`<div class="room-tags">${tags.map(t=>`<span class="room-tag">${t}</span>`).join('')}</div>`:''}
      </div>
    </div>`;
  });

  html += `</div>`;
  document.getElementById('v-rooms').innerHTML = html;
}

// ===== ACTIONS =====
function toggleTask(key) {
  S.tasks[key] = !S.tasks[key];
  save('xenos_tasks', S.tasks);
  renderView(S.view);
}

function toggleRoutine(type) {
  const key = getTodayKey();
  if(!S.routine[key]) S.routine[key] = {};
  S.routine[key][type] = !S.routine[key][type];
  save('xenos_routine', S.routine);
  renderView(S.view);
}

function toggleRoom(name) {
  const all = getAllRooms();
  if(all.has(name)) {
    if(PRELOADED_ROOMS.includes(name)) {
      // pre-loaded — can't remove from preloaded but can mark as uncomplete via extra tracking
      // For simplicity: just alert
      return;
    }
    S.extraRooms = S.extraRooms.filter(r => r !== name);
  } else {
    if(!S.extraRooms.includes(name)) S.extraRooms.push(name);
  }
  save('xenos_extra', S.extraRooms);
  renderView(S.view);
}

function addRoom() {
  const inp = document.getElementById('newRoomInput');
  if(!inp) return;
  const name = inp.value.trim();
  if(!name) return;
  if(!S.extraRooms.includes(name) && !PRELOADED_ROOMS.includes(name)) {
    S.extraRooms.push(name);
    save('xenos_extra', S.extraRooms);
  }
  inp.value = '';
  renderRooms();
}

function saveNote(wn, text) {
  S.notes[`w${wn}`] = text;
  save('xenos_notes', S.notes);
}

function setRating(wn, r) {
  const k = `w${wn}`;
  S.ratings[k] = S.ratings[k] === r ? '' : r;
  save('xenos_ratings', S.ratings);
  renderView(S.view);
}

// ===== INIT =====
loadState();
nav(S.view);

// Update sidebar week badge
document.getElementById('sb-week').textContent = 'W'+String(getCurrentWeek()).padStart(2,'0');
</script>
</body>
</html>
