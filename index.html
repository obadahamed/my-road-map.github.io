<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Road Map - Red Team Journey</title>
  <meta name="description" content="خارطة طريق تعلم Red Team / Cybersecurity - متابعة أسبوعية لمدة 52 أسبوع" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>

  <!-- Mobile sidebar toggle -->
  <button class="sb-toggle" onclick="toggleSidebar()" aria-label="فتح القائمة">☰</button>

  <!-- SIDEBAR -->
  <nav class="sidebar" aria-label="التنقل الرئيسي">
    <div class="sb-brand">
      <div class="sb-brand-name">Road <span class="sb-brand-accent">Map</span></div>
      <div class="sb-brand-sub">Red Team Journey · 52 Weeks</div>
      <div class="sb-week-badge" id="sb-week">W--</div>
    </div>

    <div class="sb-nav">
      <div class="sb-item active" data-view="today" onclick="nav('today')">
        <span class="sb-icon">📅</span>
        <span>اليوم</span>
      </div>
      <div class="sb-item" data-view="roadmap" onclick="nav('roadmap')">
        <span class="sb-icon">🗺</span>
        <span>الخارطة</span>
      </div>
      <div class="sb-item" data-view="skills" onclick="nav('skills')">
        <span class="sb-icon">📊</span>
        <span>المهارات</span>
      </div>
      <div class="sb-item" data-view="rooms" onclick="nav('rooms')">
        <span class="sb-icon">🏠</span>
        <span>الرومات</span>
      </div>
    </div>

    <div class="sb-footer">
      <div>obadahamed.github.io</div>
      <div style="margin-top:0.25rem;color:var(--dim)">52 weeks · Red Team</div>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="main" role="main">
    <div id="v-today"  class="view active"></div>
    <div id="v-roadmap" class="view"></div>
    <div id="v-skills"  class="view"></div>
    <div id="v-rooms"   class="view"></div>
  </main>

  <!-- DATA: WEEKS_DATA (loaded first) -->
  <script src="assets/data/weeks-data.js"></script>

  <!-- APP LOGIC -->
  <script src="assets/app.js"></script>

</body>
</html>
